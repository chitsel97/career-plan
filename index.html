<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justin 生涯規劃 2026–2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f6f3;
  --bg3: #f0ede8;
  --border: #e8e4de;
  --border2: #d4cfc8;
  --text: #1a1814;
  --text2: #6b6560;
  --text3: #a8a39c;
  --blue: #1a56db;
  --blue-bg: #eff4ff;
  --blue-border: #c7d7fa;
  --purple: #6b3fa0;
  --purple-bg: #f3eeff;
  --purple-border: #d9c9f5;
  --green: #0e6640;
  --green-bg: #edfaf1;
  --green-border: #b9e9c9;
  --amber: #854d0e;
  --amber-bg: #fffbeb;
  --amber-border: #fde68a;
  --coral: #9f1239;
  --coral-bg: #fff1f2;
  --coral-border: #fecdd3;
  --serif: 'Playfair Display', serif;
  --sans: 'Noto Sans TC', sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
}

/* Header */
.header {
  background: var(--bg);
  border-bottom: 1.5px solid var(--border);
  padding: 1.75rem 2.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  letter-spacing: .01em;
  line-height: 1.2;
}
.header-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
  font-family: var(--mono);
  letter-spacing: .02em;
}
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1.5px solid var(--border2);
  background: var(--bg);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .02em;
}
.btn:hover { border-color: var(--text2); color: var(--text); background: var(--bg2); }
.btn-accent {
  border-color: var(--purple-border);
  background: var(--purple-bg);
  color: var(--purple);
}
.btn-accent:hover { border-color: var(--purple); }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1.5px solid var(--border);
}
.stat {
  padding: 1.5rem 2rem;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }
.stat-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.stat-val {
  font-family: var(--serif);
  font-size: 36px;
  color: var(--text);
  line-height: 1;
}
.stat-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 5px;
}
.stat-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .7s cubic-bezier(.4,0,.2,1);
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1.5px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--bg);
  position: sticky;
  top: 89px;
  z-index: 90;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-family: var(--mono);
  font-size: 12px;
  padding: 16px 24px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  letter-spacing: .03em;
  line-height: 1.4;
  text-align: left;
}
.tab:hover { color: var(--text2); background: var(--bg2); }
.tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
  background: var(--bg);
}

/* Content */
.content { padding: 2rem 2.5rem 5rem; max-width: 900px; }

/* Exam card */
.exam-card {
  border: 1.5px solid var(--border);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
  background: var(--bg);
  transition: border-color .15s, box-shadow .15s;
}
.exam-card:hover {
  border-color: var(--border2);
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.exam-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.exam-stripe {
  width: 4px;
  height: 32px;
  border-radius: 2px;
  flex-shrink: 0;
}
.exam-title-wrap { flex: 1 }
.exam-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.exam-cost {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.exam-pct {
  font-family: var(--serif);
  font-size: 20px;
  min-width: 48px;
  text-align: right;
  font-weight: 600;
}
.exam-body { padding: 0 18px 6px; }
.exam-prep {
  font-size: 13px;
  color: var(--text2);
  padding: 12px 0 10px;
  border-bottom: 1px solid var(--border);
  line-height: 1.8;
}

/* Chapter */
.ch-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.ch-row:last-of-type { border-bottom: none; }
.ch-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  background: var(--bg);
}
.ch-check:hover { border-color: var(--purple); background: var(--purple-bg); }
.ch-check.done { background: var(--text); border-color: var(--text); }
.ch-check.done::after {
  content: '';
  width: 9px; height: 6px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translate(1px,-1px);
  display: block;
}
.ch-info { flex: 1; min-width: 0; }
.ch-name-line {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.ch-name {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  flex: 1;
}
.ch-name.done { color: var(--text3); text-decoration: line-through; }
.ch-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}
.ch-note {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.ch-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  flex-shrink: 0;
}
.badge-hot { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.badge-key { background: var(--coral-bg); color: var(--coral); border: 1px solid var(--coral-border); }
.badge-daily { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-exam { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.badge-default { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

.edit-btn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  flex-shrink: 0;
  transition: all .12s;
}
.edit-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--bg2); }

/* Edit form */
.edit-form {
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 12px;
  margin: 4px 0 10px 30px;
}
.edit-form input, .edit-form textarea {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 7px 10px;
  margin-bottom: 7px;
  outline: none;
  transition: border-color .15s;
}
.edit-form input:focus, .edit-form textarea:focus { border-color: var(--purple); }
.edit-form textarea { resize: vertical; min-height: 52px; }
.ef-row { display: flex; gap: 7px; }
.ef-row input { margin-bottom: 0; }
.ef-actions { display: flex; gap: 7px; margin-top: 8px; }
.ef-save {
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 5px;
  border: 1.5px solid var(--purple-border);
  background: var(--purple-bg);
  color: var(--purple);
  cursor: pointer;
  transition: all .12s;
}
.ef-save:hover { border-color: var(--purple); }
.ef-cancel {
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 5px;
  border: 1.5px solid var(--border2);
  background: var(--bg);
  color: var(--text3);
  cursor: pointer;
}
.ef-del {
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 5px;
  border: 1.5px solid var(--coral-border);
  background: var(--coral-bg);
  color: var(--coral);
  cursor: pointer;
  margin-left: auto;
}

.add-ch {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  padding: 9px 0 5px;
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  transition: color .12s;
}
.add-ch:hover { color: var(--purple); }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--text);
  color: #fff;
  font-family: var(--mono);
  font-size: 12px;
  padding: 9px 18px;
  border-radius: 6px;
  opacity: 0;
  transition: all .2s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.qpanel { display: none; }
.qpanel.active { display: block; }

@media (max-width: 640px) {
  .header { padding: 1.25rem 1.25rem; }
  .header-title { font-size: 18px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stat { padding: 1.25rem 1.25rem; border-bottom: 1px solid var(--border); }
  .content { padding: 1.25rem 1.25rem 4rem; }
  .tabs { top: 82px; }
}
</style>
</head>

let data;
let activeQid = 'q1';
let editingCid = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    data = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(RAW));
  } catch(e) { data = JSON.parse(JSON.stringify(RAW)); }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function totalStats() {
  let total = 0, done = 0;
  data.forEach(q => q.exams.forEach(e => e.chapters.forEach(c => { total++; if(c.done) done++; })));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function quarterStats(qid) {
  const q = data.find(x => x.id === qid);
  if (!q) return { total:0, done:0, pct:0 };
  let total = 0, done = 0;
  q.exams.forEach(e => e.chapters.forEach(c => { total++; if(c.done) done++; }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function updateStats() {
  const s = totalStats();
  const q = quarterStats(activeQid);
  document.getElementById('s-pct').textContent = s.pct + '%';
  document.getElementById('s-sub').textContent = s.done + ' / ' + s.total + ' 章節完成';
  document.getElementById('s-bar').style.width = s.pct + '%';
  document.getElementById('q-pct').textContent = q.pct + '%';
  document.getElementById('q-sub').textContent = q.done + ' / ' + q.total + ' 章節完成';
  document.getElementById('q-bar').style.width = q.pct + '%';
  document.getElementById('s-done').textContent = s.done;
  document.getElementById('s-left').textContent = s.total - s.done;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = data.map(q =>
    `<button class="tab${q.id === activeQid ? ' active' : ''}" onclick="switchTab('${q.id}')">${q.label}<br><span style="font-size:10px;opacity:.6">${q.sub}</span></button>`
  ).join('');
}

function badgeClass(b) {
  if (!b) return '';
  const map = { '高頻':'badge-hot','關鍵':'badge-key','重要':'badge-key','考試':'badge-exam','每日':'badge-daily','核心':'badge-hot','優先':'badge-hot','每週':'badge-daily' };
  return map[b] || 'badge-default';
}

function examPct(e) {
  const total = e.chapters.length, done = e.chapters.filter(c => c.done).length;
  return total ? Math.round(done/total*100) : 0;
}

function pctColor(pct) {
  if (pct === 100) return 'var(--green)';
  if (pct > 50) return 'var(--purple)';
  return 'var(--text3)';
}

function renderChapter(qid, eid, c) {
  const bc = badgeClass(c.badge);
  return `
  <div class="ch-row" id="ch_${c.id}">
    <div class="ch-check${c.done?' done':''}" onclick="toggleDone('${qid}','${eid}','${c.id}')"></div>
    <div class="ch-info">
      <div class="ch-name-line">
        <span class="ch-name${c.done?' done':''}">${c.name}</span>
        ${c.badge ? `<span class="ch-badge ${bc}">${c.badge}</span>` : ''}
        <span class="ch-date">${c.date}</span>
        <button class="edit-btn" onclick="toggleEdit('${qid}','${eid}','${c.id}')">編輯</button>
      </div>
      ${c.note ? `<div class="ch-note">${c.note}</div>` : ''}
    </div>
  </div>
  <div class="edit-form" id="ef_${c.id}" style="display:none">
    <input id="en_${c.id}" value="${c.name.replace(/"/g,'&quot;')}" placeholder="章節名稱">
    <div class="ef-row">
      <input id="ed_${c.id}" value="${c.date}" placeholder="日期">
      <input id="eb_${c.id}" value="${c.badge||''}" placeholder="標籤（高頻/考試/每日…）">
    </div>
    <input id="eno_${c.id}" value="${c.note||''}" placeholder="備注（選填）">
    <div class="ef-actions">
      <button class="ef-save" onclick="saveEdit('${qid}','${eid}','${c.id}')">儲存</button>
      <button class="ef-cancel" onclick="closeEdit('${c.id}')">取消</button>
      <button class="ef-del" onclick="deleteCh('${qid}','${eid}','${c.id}')">刪除</button>
    </div>
  </div>`;
}

function renderExam(qid, e) {
  const pct = examPct(e);
  return `
  <div class="exam-card" id="exam_${e.id}">
    <div class="exam-head">
      <div class="exam-stripe" style="background:${e.color}"></div>
      <div class="exam-title-wrap">
        <div class="exam-title">${e.title}</div>
        <div class="exam-cost">${e.cost}</div>
      </div>
      <div class="exam-pct" style="color:${pctColor(pct)}">${pct}%</div>
    </div>
    <div class="exam-body">
      <div class="exam-prep">${e.prep}</div>
      ${e.chapters.map(c => renderChapter(qid, e.id, c)).join('')}
      <button class="add-ch" onclick="showAddForm('${qid}','${e.id}')">+ 新增章節</button>
      <div class="edit-form" id="addform_${e.id}" style="display:none">
        <input id="an_${e.id}" placeholder="章節名稱">
        <div class="ef-row">
          <input id="ad_${e.id}" placeholder="日期">
          <input id="ab_${e.id}" placeholder="標籤（選填）">
        </div>
        <input id="ano_${e.id}" placeholder="備注（選填）">
        <div class="ef-actions">
          <button class="ef-save" onclick="addChapter('${qid}','${e.id}')">新增</button>
          <button class="ef-cancel" onclick="document.getElementById('addform_${e.id}').style.display='none'">取消</button>
        </div>
      </div>
    </div>
  </div>`;
}

function switchTab(qid) {
  activeQid = qid;
  renderTabs();
  document.getElementById('content').innerHTML = data.find(x=>x.id===qid).exams.map(e=>renderExam(qid,e)).join('');
  updateStats();
}

function refreshExamCard(qid, e) {
  const el = document.getElementById('exam_' + e.id);
  if (el) { const t = document.createElement('div'); t.innerHTML = renderExam(qid, e); el.replaceWith(t.firstElementChild); }
}

function toggleDone(qid, eid, cid) {
  const q = data.find(x=>x.id===qid), e = q.exams.find(x=>x.id===eid), c = e.chapters.find(x=>x.id===cid);
  c.done = !c.done;
  saveData(); refreshExamCard(qid, e); updateStats();
  toast(c.done ? '完成 ✓' : '取消完成');
}

function toggleEdit(qid, eid, cid) {
  if (editingCid && editingCid !== cid) { const p = document.getElementById('ef_'+editingCid); if(p) p.style.display='none'; }
  const f = document.getElementById('ef_'+cid);
  if (!f) return;
  const show = f.style.display !== 'none';
  f.style.display = show ? 'none' : 'block';
  editingCid = show ? null : cid;
}

function closeEdit(cid) { const f=document.getElementById('ef_'+cid); if(f) f.style.display='none'; editingCid=null; }

function saveEdit(qid, eid, cid) {
  const q=data.find(x=>x.id===qid), e=q.exams.find(x=>x.id===eid), c=e.chapters.find(x=>x.id===cid);
  c.name = document.getElementById('en_'+cid).value || c.name;
  c.date = document.getElementById('ed_'+cid).value;
  c.badge = document.getElementById('eb_'+cid).value;
  c.note = document.getElementById('eno_'+cid).value;
  saveData(); closeEdit(cid); refreshExamCard(qid, e); toast('已儲存');
}

function deleteCh(qid, eid, cid) {
  if (!confirm('確定刪除？')) return;
  const q=data.find(x=>x.id===qid), e=q.exams.find(x=>x.id===eid);
  e.chapters = e.chapters.filter(x=>x.id!==cid);
  saveData(); refreshExamCard(qid, e); updateStats(); toast('已刪除');
}

function showAddForm(qid, eid) { document.getElementById('addform_'+eid).style.display='block'; }

function addChapter(qid, eid) {
  const name = document.getElementById('an_'+eid).value.trim();
  if (!name) return;
  const q=data.find(x=>x.id===qid), e=q.exams.find(x=>x.id===eid);
  e.chapters.push({ id:eid+'_'+Date.now(), name, date:document.getElementById('ad_'+eid).value, badge:document.getElementById('ab_'+eid).value, note:document.getElementById('ano_'+eid).value, done:false });
  saveData(); document.getElementById('addform_'+eid).style.display='none'; refreshExamCard(qid, e); updateStats(); toast('新增成功');
}

function resetProgress() {
  if (!confirm('確定重置所有勾選進度？內容不會消失。')) return;
  data.forEach(q=>q.exams.forEach(e=>e.chapters.forEach(c=>c.done=false)));
  saveData(); switchTab(activeQid); toast('進度已重置');
}

function exportStatus() {
  const s=totalStats(); let out='Justin 生涯規劃進度報告\n匯出時間：'+new Date().toLocaleString('zh-TW')+'\n總體進度：'+s.pct+'% ('+s.done+'/'+s.total+')\n\n';
  data.forEach(q=>{ const qs=quarterStats(q.id); out+='【'+q.label+' '+q.sub+'】 '+qs.pct+'%\n'; q.exams.forEach(e=>{ out+='  '+e.title+' ('+examPct(e)+'%)\n'; e.chapters.forEach(c=>{ out+='    ['+(c.done?'V':' ')+'] '+c.name+' '+c.date+'\n'; }); }); out+='\n'; });
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([out],{type:'text/plain;charset=utf-8'})); a.download='justin_progress_'+new Date().toISOString().slice(0,10)+'.txt'; a.click(); toast('進度已匯出');
}

loadData(); renderTabs(); switchTab('q1');
</script>
